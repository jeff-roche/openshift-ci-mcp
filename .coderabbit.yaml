language: en-US

reviews:
  profile: chill
  high_level_summary: true
  high_level_summary_instructions: |
    If the PR already has a description, only do an additive summary to avoid duplication in the PR description.
  high_level_summary_placeholder: "@coderabbitai summary"
  sequence_diagrams: false
  poem: false
  review_status: true
  changed_files_summary: true
  collapse_walkthrough: false
  request_changes_workflow: false
  abort_on_close: true

  auto_review:
    enabled: true
    drafts: true
    base_branches:
      - main

  path_instructions:
    - path: "**"
      instructions: |
        Review all changes against the guidelines in CONTRIBUTING.md. Flag any violations as severity level "medium".
        When a finding is a violation of CONTRIBUTING.md, explicitly state that in the comment (e.g., "Per CONTRIBUTING.md: ...") and quote or reference the specific guideline being violated.

  tools:
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    ruff:
      enabled: true

chat:
  auto_reply: true
  integrations:
    jira:
      usage: auto

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
