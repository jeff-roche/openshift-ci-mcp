kind: Eval
metadata:
  name: "openshift-ci-mcp"

config:
  agent:
    type: "builtin.claude-code"

  mcpConfigFile: mcp-config.yaml

  llmJudge:
    ref:
      type: "builtin.claude-code"

  defaultTaskLimits:
    timeout: "10m"
    cleanupTimeout: "1m"

  taskSets:
    # Core tools (get_releases, get_release_health, get_variants)
    - glob: tasks/*.yaml
      labelSelector:
        suite: core
      assertions:
        toolsUsed:
          - server: openshift-ci
            toolPattern: "get_release.*|get_variants"
        toolsNotUsed:
          - server: openshift-ci
            toolPattern: "sippy_api|release_controller_api|search_ci_api"
        minToolCalls: 1
        maxToolCalls: 5

    # Job tools (get_job_report, get_job_runs, get_job_run_summary)
    - glob: tasks/*.yaml
      labelSelector:
        suite: jobs
      assertions:
        toolsUsed:
          - server: openshift-ci
            toolPattern: "get_job_.*"
        toolsNotUsed:
          - server: openshift-ci
            toolPattern: "sippy_api|release_controller_api|search_ci_api"
        minToolCalls: 1
        maxToolCalls: 5

    # Test tools (get_ci_test_report, get_test_details, get_recent_test_failures)
    - glob: tasks/*.yaml
      labelSelector:
        suite: tests
      assertions:
        toolsUsed:
          - server: openshift-ci
            toolPattern: "get_ci_test_report|get_test_details|get_recent_test_failures"
        toolsNotUsed:
          - server: openshift-ci
            toolPattern: "sippy_api|release_controller_api|search_ci_api"
        minToolCalls: 1
        maxToolCalls: 5

    # Payload tools (get_component_readiness, get_payload_status, etc.)
    - glob: tasks/*.yaml
      labelSelector:
        suite: payload
      assertions:
        toolsUsed:
          - server: openshift-ci
            toolPattern: "get_component_readiness|get_regressions|get_regression_detail|get_payload_.*"
        toolsNotUsed:
          - server: openshift-ci
            toolPattern: "sippy_api|release_controller_api|search_ci_api"
        minToolCalls: 1
        maxToolCalls: 5

    # Pull request tools (get_release_prs, get_pr_impact)
    - glob: tasks/*.yaml
      labelSelector:
        suite: prs
      assertions:
        toolsUsed:
          - server: openshift-ci
            toolPattern: "get_release_prs|get_pr_impact"
        toolsNotUsed:
          - server: openshift-ci
            toolPattern: "sippy_api|release_controller_api|search_ci_api"
        minToolCalls: 1
        maxToolCalls: 5

    # Multi-tool workflow
    - glob: tasks/*.yaml
      labelSelector:
        suite: workflow
      assertions:
        toolsUsed:
          - server: openshift-ci
            tool: get_releases
          - server: openshift-ci
            tool: get_release_health
          - server: openshift-ci
            tool: get_job_report
        callOrder:
          - type: tool
            server: openshift-ci
            name: get_releases
          - type: tool
            server: openshift-ci
            name: get_job_report
        minToolCalls: 3
        maxToolCalls: 5

    # Proxy passthrough (sippy_api)
    - glob: tasks/*.yaml
      labelSelector:
        suite: proxies
      assertions:
        toolsUsed:
          - server: openshift-ci
            tool: sippy_api
        toolsNotUsed:
          - server: openshift-ci
            toolPattern: "get_.*"
        minToolCalls: 1
        maxToolCalls: 3
