kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: investigate-release
  difficulty: hard
  labels:
    suite: workflow
    category: multi-tool
  parallel: true
spec:
  prompt:
    inline: |
      Investigate the health of the current in-development OpenShift release
      and then give an overview of the worst-performing jobs for single node OpenShift on the aws platform.
      Give me a summary of the release status with specific data points.
